[theme]
base                     = "dark"
primaryColor             = "#3B82F6"
backgroundColor          = "#050C1F"
secondaryBackgroundColor = "#0A1628"
textColor                = "#E2E8F0"
font                     = "sans serif"

[server]
maxUploadSize            = 10
enableCORS               = false
enableXsrfProtection     = true

[browser]
gatherUsageStats         = false
